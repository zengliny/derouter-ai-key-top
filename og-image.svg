<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="300" fill="rgba(99, 102, 241, 0.1)"/>
  <circle cx="1100" cy="530" r="400" fill="rgba(34, 211, 238, 0.1)"/>

  <!-- Main text -->
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle">derouter.ai-key.top</text>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#888899" text-anchor="middle">Claude GPT API 中转站</text>

  <!-- Price highlight -->
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#accent)" text-anchor="middle">仅需官方价格的 10%</text>

  <!-- CTA -->
  <rect x="450" y="500" width="300" height="60" rx="12" fill="url(#accent)"/>
  <text x="600" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">立即免费试用</text>
</svg>
